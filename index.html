<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>live-drumz</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <button id="btn-orientation" aria-label="Toggle orientation">⟳</button>

  <div id="switch-overlay"><span class="switch-arrow"></span></div>

  <div id="video-overlay"></div>

  <div id="video-container">
    <div id="yt-player"></div>
  </div>

  <div id="start-overlay">
    <p class="start-label">live-drumz</p>
    <div class="start-tap">Tap to Start</div>
    <p class="start-hint">↕ swipe to switch tracks</p>
  </div>

  <div id="transport">
    <button id="btn-play-pause" aria-label="Play or pause">⏸</button>
    <button id="btn-bt" aria-label="Bluetooth sync">BT</button>
    <button id="btn-load" aria-label="Load YouTube URL">URL</button>
  </div>

  <div id="yt-load-panel" hidden>
    <p class="yt-load-label">Paste a YouTube playlist or video URL</p>
    <div class="yt-load-row">
      <input type="url" id="yt-url-input" placeholder="https://youtube.com/…" autocomplete="off" spellcheck="false">
      <button id="yt-url-go">Go</button>
    </div>
    <p class="yt-load-error" id="yt-load-error" hidden>Couldn't recognise that URL</p>
  </div>

  <div id="bt-panel" hidden>
    <span class="bt-panel-label">BT sync</span>
    <input type="range" id="bt-slider" min="-1000" max="1000" step="25" value="0">
    <span id="bt-value">0 ms</span>
  </div>

  <div id="pad-grid">
    <div class="pad" data-sound="kick"></div>
    <div class="pad" data-sound="clap"></div>
    <div class="pad" data-sound="snare"></div>
    <div class="pad" data-sound="hihat"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
